<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donezo Dashboard - Logged Out</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card text-center">
            <div class="logo justify-center" style="margin-bottom: 24px;">
                <i class="ph-fill ph-spinner-gap" style="color: var(--primary); font-size: 32px;"></i>
                <h2 style="font-size: 24px;">Donezo</h2>
            </div>
            <div style="background: rgba(46, 204, 113, 0.1); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
                <i class="ph ph-check" style="color: var(--primary-light); font-size: 32px;"></i>
            </div>
            <h1 style="font-size: 20px; font-weight: 600; margin-bottom: 8px;">Logged Out Successfully</h1>
            <p style="color: var(--text-sub); font-size: 14px; margin-bottom: 32px;">Thank you for using Donezo. Have a great day!</p>
            <a href="index.html" class="btn-primary" style="display: block; width: 100%; text-decoration: none;">Return to Dashboard</a>

    </div>
